# OpenWA / notas de voz (whatsapp-web.js)
# - API REST: mimetype application/ogg + base64 (audio/ogg devuelve 500)
# - Motor: parche patch_send_audio_voice.py → sendAudioAsVoice + audio/ogg; codecs=opus
# - El .ogg debe ser códec Opus (OpusHead), no Vorbis → si no, llega como adjunto
# - Reaplicar tras recrear contenedor: docker cp + python3 patch_send_audio_voice.py
#
# OpenWA bloquea URLs cuyo DNS resuelve a IP privada (SSRF).
# supabase.lipoout.com → 192.168.99.112 en la red interna.
#
# Opción A (recomendada): permitir el host explícitamente
#   SSRF_ALLOWED_HOSTS=supabase.lipoout.com,suite.lipoout.com
#
# Opción B: desactivar protección SSRF de webhooks
#   WEBHOOK_SSRF_PROTECT=false
#
# NOTA: SECURITY_SSRF_DISABLE no aplica; OpenWA usa WEBHOOK_SSRF_PROTECT.
#
# Ejemplo (aaPanel / docker compose):
#   environment:
#     - SSRF_ALLOWED_HOSTS=supabase.lipoout.com,suite.lipoout.com
#     - WEBHOOK_SSRF_PROTECT=true
