# Stack Portainer — LXC unprivileged Proxmox (CIFS en host + bind mount)
#
# Prerrequisitos:
#   - Host Proxmox: CIFS montado en /mnt/style-sync (ver PROXMOX-LXC-CIFS.md)
#   - LXC: mp0: /mnt/style-sync,mp=/mnt/style
#   - Dentro del LXC Docker ve /mnt/style
#
# NO usar driver cifs en este snippet dentro de LXC unprivileged.

services:
  style-sync-agent:
    build:
      context: ./style-sync-agent
      dockerfile: Dockerfile
    image: style-sync-agent:0.2.1
    container_name: style-sync-agent
    restart: unless-stopped
    environment:
      STYLE_ROOT: /style
      SUPABASE_URL: https://supabase.lipoout.com
      SUPABASE_SERVICE_ROLE_KEY: ${STYLE_SYNC_SERVICE_ROLE_KEY}
      COMPANY_ID: ${STYLE_SYNC_COMPANY_ID}
      POLL_MS: "1500"
      INBOUND_POLL_MS: "3000"
      INBOUND_BATCH: "50"
      INBOUND_DIR: /style/sync/inbound
      INBOUND_ACK_DIR: /style/sync/inbound_ack
      ARCHIVE_DIR: /style/sync/archive
      DEADLETTER_DIR: /style/sync/deadletter
      HEARTBEAT_PATH: /style/sync/heartbeat.txt
      HEARTBEAT_CHECK_MS: "60000"
      HEARTBEAT_STALE_MS: "300000"
      LAG_ALERT_MS: "30000"
      FS_RETRY_MAX: "6"
      FS_RETRY_BASE_MS: "100"
      OUTBOUND_MAX_RETRIES: "5"
      INBOUND_ACK_MAX_RETRIES: "5"
    volumes:
      # Bind desde LXC (/mnt/style) — NO volumen CIFS Docker
      - /mnt/style:/style:rw
